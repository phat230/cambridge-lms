<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khu Vực Học Sinh - Cambridge LMS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="header">
    <h2>Cambridge LMS - Học sinh</h2>
    <div>
        <span id="userEmailDisplay" class="user-email"></span>
        <button class="logout-btn" onclick="logout()">Đăng Xuất</button>
    </div>
</div>

<div class="container" id="dashboard">
    <h3>Danh sách bài test</h3>
    <div class="exam-grid" id="examGrid"></div>
</div>

<div class="container wide-container" id="testRoom">
    <div class="exam-header-bar">
        <h3 id="activeExamTitle">Tên bài</h3>
        <div class="timer" id="countdownTimer">00:00</div>
        <button class="submit-btn" onclick="submitExam(false)">Nộp bài</button>
    </div>

    <div class="flip-toolbar">
        <button class="secondary-btn" onclick="prevStudentPage()">← Trang trước</button>
        <strong id="studentPageCounter">Trang 1 / 1</strong>
        <button class="secondary-btn" onclick="nextStudentPage()">Trang sau →</button>
    </div>

    <div id="studentPageView" class="student-page-view"></div>
</div>

<div class="container" id="resultScreen">
    <div class="score-details">
        <div class="score-box"><h3 id="finalScoreDisplay">0</h3><p>Tổng điểm</p></div>
        <div class="score-box blue-score-box"><h3 id="correctCountDisplay">0 / 0</h3><p>Số câu đúng</p></div>
        <div class="score-box orange-score-box"><h3 id="timeSpentDisplay">0:00</h3><p>Thời gian</p></div>
    </div>

    <h3>Chi tiết kết quả</h3>
    <div class="table-wrap">
        <table class="mistake-list">
            <thead>
                <tr>
                    <th>Trang</th>
                    <th>Câu</th>
                    <th>Bạn trả lời</th>
                    <th>Đáp án đúng</th>
                    <th>Điểm</th>
                    <th>Trạng thái</th>
                </tr>
            </thead>
            <tbody id="mistakeBody"></tbody>
        </table>
    </div>
    <button class="submit-btn full-width mt-20" onclick="backToDashboard()">Quay về trang chủ</button>
</div>

<script>
const API_URL = "https://cambridge-lms-1.onrender.com";
let examsDataList = [];
let activeExamData = null;
let studentPages = [];
let currentPageIndex = 0;
let answers = {};
let examStartTime = null;
let timerInterval = null;
let isSubmitting = false;

window.onload = function() {
    if (localStorage.getItem("role") !== "student") {
        window.location.href = "index.html";
        return;
    }
    document.getElementById("userEmailDisplay").innerText = "Học viên: " + localStorage.getItem("email");
    loadExamsForStudent();
    setupAudioSecureListeners();
};

function logout() {
    if (confirm("Bạn muốn đăng xuất?")) {
        localStorage.clear();
        window.location.href = "index.html";
    }
}

function escapeHtml(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function formatTime(seconds) {
    seconds = parseInt(seconds || 0);
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${m}:${s.toString().padStart(2, "0")}`;
}


function normalizeChoiceValue(value) {
    return String(value ?? "");
}

function questionTypeLabel(type) {
    const labels = {
        text: "Điền từ / số",
        single_choice: "Chọn 1 đáp án",
        multi_choice: "Chọn nhiều đáp án",
        tick_cross: "Tick / Cross",
        yes_no: "Yes / No",
        manual: "Tự luận"
    };
    return labels[type] || labels.text;
}

function getQuestionOptions(q) {
    const type = q.question_type || "text";
    if (type === "yes_no") return ["yes", "no"];
    if (type === "tick_cross") return ["✓", "✗"];
    if (Array.isArray(q.options) && q.options.length) return q.options;
    if (type === "single_choice") return ["A", "B", "C"];
    if (type === "multi_choice") return ["A", "B", "C", "D"];
    return [];
}

function renderAnswerControl(q) {
    const qid = q.id;
    const type = q.question_type || "text";
    const current = answers[qid];
    const prompt = q.prompt ? `<div class="question-prompt">${escapeHtml(q.prompt)}</div>` : "";

    if (type === "single_choice" || type === "yes_no" || type === "tick_cross") {
        const options = getQuestionOptions(q);
        return `
            ${prompt}
            <div class="student-choice-group" data-question-id="${escapeHtml(qid)}" data-question-type="${escapeHtml(type)}">
                ${options.map((opt, index) => {
                    const checked = String(current || "") === String(opt) ? "checked" : "";
                    return `
                        <label class="choice-pill">
                            <input class="student-answer-control" type="radio" name="answer_${escapeHtml(qid)}" value="${escapeHtml(opt)}" ${checked}>
                            <span>${escapeHtml(opt)}</span>
                        </label>
                    `;
                }).join("")}
            </div>
        `;
    }

    if (type === "multi_choice") {
        const options = getQuestionOptions(q);
        const currentList = Array.isArray(current) ? current.map(String) : [];
        return `
            ${prompt}
            <div class="student-choice-group" data-question-id="${escapeHtml(qid)}" data-question-type="multi_choice">
                ${options.map(opt => {
                    const checked = currentList.includes(String(opt)) ? "checked" : "";
                    return `
                        <label class="choice-pill">
                            <input class="student-answer-control" type="checkbox" name="answer_${escapeHtml(qid)}" value="${escapeHtml(opt)}" ${checked}>
                            <span>${escapeHtml(opt)}</span>
                        </label>
                    `;
                }).join("")}
            </div>
        `;
    }

    if (type === "manual") {
        return `
            ${prompt}
            <textarea class="student-answer-input student-answer-control" data-question-id="${escapeHtml(qid)}" data-question-type="manual" placeholder="Nhập câu trả lời...">${escapeHtml(current || "")}</textarea>
        `;
    }

    return `
        ${prompt}
        <input class="student-answer-input student-answer-control" data-question-id="${escapeHtml(qid)}" data-question-type="text" type="text" value="${escapeHtml(current || '')}" placeholder="Nhập đáp án..." autocomplete="off">
        <div class="question-help-text">Có thể nhập số hoặc chữ nếu câu đó cho phép, ví dụ: 6 hoặc six.</div>
    `;
}

async function loadExamsForStudent() {
    const grid = document.getElementById("examGrid");
    grid.innerHTML = "Đang tải...";
    try {
        const response = await fetch(`${API_URL}/exams/`);
        examsDataList = await response.json();
        grid.innerHTML = "";
        if (!examsDataList.length) {
            grid.innerHTML = "<p>Chưa có bài test nào.</p>";
            return;
        }

        const userId = localStorage.getItem("user_id");
        for (const exam of examsDataList) {
            let submittedData = {submitted: false};
            try {
                const checkResponse = await fetch(`${API_URL}/exams/${exam._id}/my-submission/${userId}`);
                submittedData = await checkResponse.json();
            } catch {}

            const pages = exam.pages || [];
            const activePages = pages.filter(p => p.is_active !== false);
            const questionCount = activePages.reduce((sum, p) => sum + ((p.questions || []).length), 0);
            let actionHtml = "";
            let resultHtml = "";

            if (!activePages.length || questionCount === 0) {
                actionHtml = `<button class="take-exam-btn" disabled>Chưa sẵn sàng</button>`;
            } else if (submittedData.submitted) {
                const sub = submittedData.submission;
                actionHtml = `<button class="take-exam-btn" disabled>Đã làm bài</button>`;
                resultHtml = `<div class="student-result-badge">Điểm: <b>${escapeHtml(sub.score)}</b> | Đúng: <b>${escapeHtml(sub.correct_count)}/${escapeHtml(sub.total_questions)}</b> | TG: <b>${formatTime(sub.time_spent_seconds)}</b></div>`;
            } else {
                actionHtml = `<button class="take-exam-btn" onclick="startExam('${exam._id}')">Bắt đầu làm bài</button>`;
            }

            grid.insertAdjacentHTML("beforeend", `
                <div class="exam-card">
                    <h3>${escapeHtml(exam.title)}</h3>
                    <div class="exam-meta">
                        <p><strong>Cấp độ:</strong> ${escapeHtml(exam.level)}</p>
                        <p><strong>Thời gian:</strong> ${escapeHtml(exam.duration_minutes)} phút</p>
                        <p><strong>Số trang:</strong> ${activePages.length}</p>
                        <p><strong>Số câu:</strong> ${questionCount}</p>
                    </div>
                    ${resultHtml}
                    ${actionHtml}
                </div>
            `);
        }
    } catch (err) {
        console.error(err);
        grid.innerHTML = `<p class="danger-text">Không tải được danh sách bài test.</p>`;
    }
}

async function startExam(examId) {
    if (!confirm("Bắt đầu bài test? Bạn chỉ được làm 1 lần.")) return;
    try {
        const response = await fetch(`${API_URL}/exams/${examId}/student-view`);
        activeExamData = await response.json();
        if (!response.ok) throw new Error(activeExamData.detail || "Không tải được bài test");

        studentPages = activeExamData.pages || [];
        if (!studentPages.length) {
            alert("Bài test chưa có trang hoạt động.");
            return;
        }
        answers = {};
        currentPageIndex = 0;
        examStartTime = Date.now();

        document.getElementById("dashboard").style.display = "none";
        document.getElementById("resultScreen").style.display = "none";
        document.getElementById("testRoom").style.display = "block";
        document.getElementById("activeExamTitle").innerText = activeExamData.title;

        renderStudentPage();
        startTimer(activeExamData.duration_minutes);
    } catch (err) {
        alert(err.message);
    }
}

function saveCurrentPageAnswers() {
    if (!studentPages[currentPageIndex]) return;
    const page = studentPages[currentPageIndex];

    (page.questions || []).forEach(q => {
        const type = q.question_type || "text";
        const qid = q.id;

        if (type === "single_choice" || type === "yes_no" || type === "tick_cross") {
            const checked = document.querySelector(`input[name="answer_${CSS.escape(qid)}"]:checked`);
            answers[qid] = checked ? checked.value : "";
            return;
        }

        if (type === "multi_choice") {
            answers[qid] = Array.from(document.querySelectorAll(`input[name="answer_${CSS.escape(qid)}"]:checked`)).map(input => input.value);
            return;
        }

        const input = document.querySelector(`[data-question-id="${CSS.escape(qid)}"]`);
        answers[qid] = input ? input.value.trim() : "";
    });
}

function prevStudentPage() {
    saveCurrentPageAnswers();
    currentPageIndex = Math.max(0, currentPageIndex - 1);
    renderStudentPage();
}

function nextStudentPage() {
    saveCurrentPageAnswers();
    if (currentPageIndex >= studentPages.length - 1) {
        alert("Đây là trang cuối. Hãy kiểm tra lại rồi bấm Nộp bài.");
        return;
    }
    currentPageIndex += 1;
    renderStudentPage();
}

function renderStudentPage() {
    const page = studentPages[currentPageIndex];
    document.getElementById("studentPageCounter").innerText = `Trang ${currentPageIndex + 1} / ${studentPages.length} — Trang gốc ${page.page_number}`;

    const audioHtml = (page.audio_tracks || []).map((audio, index) => {
        const limit = Number(audio.limit || 0);
        const storageKey = `listen_${activeExamData._id}_${page.id}_${audio.id}`;
        const played = parseInt(localStorage.getItem(storageKey)) || 0;
        const locked = limit > 0 && played >= limit;
        return `
            <div class="audio-track-item">
                <div class="track-info">
                    <strong>${escapeHtml(audio.name)}</strong>
                    <span class="track-status" id="audio_status_${escapeHtml(audio.id)}">${locked ? '❌ Hết lượt nghe' : (limit > 0 ? `Đã nghe: ${played}/${limit}` : 'Nghe tự do')}</span>
                </div>
                ${locked ? `<div class="locked-player">Đã hết lượt nghe.</div>` : `<audio controls controlsList="nodownload" src="${escapeHtml(audio.url)}" data-page-id="${escapeHtml(page.id)}" data-audio-id="${escapeHtml(audio.id)}" data-limit="${limit}"></audio>`}
            </div>
        `;
    }).join("");

    const questionsHtml = (page.questions || []).map(q => `
        <div class="student-question-card">
            <div class="student-question-title">
                <strong>Câu ${escapeHtml(q.number)}</strong>
                <span class="question-type-badge">${escapeHtml(questionTypeLabel(q.question_type))}</span>
                <span class="question-score">${escapeHtml(q.score || 1)} điểm</span>
            </div>
            ${renderAnswerControl(q)}
        </div>
    `).join("") || `<p class="hint-text">Trang này không có câu trả lời cần nhập.</p>`;

    document.getElementById("studentPageView").innerHTML = `
        <div class="student-flip-layout">
            <div class="student-book-page">
                <img src="${escapeHtml(page.image_url)}" alt="Trang ${escapeHtml(page.page_number)}">
            </div>
            <div class="student-answer-panel">
                <h3>Trang ${escapeHtml(page.page_number)}</h3>
                <div class="playlist-container">
                    <div class="playlist-title">🎵 Audio của trang</div>
                    ${audioHtml || `<p class="hint-text">Trang này không có audio.</p>`}
                </div>
                <h4>Trả lời câu hỏi trong trang này</h4>
                ${questionsHtml}
            </div>
        </div>
    `;
}

function setupAudioSecureListeners() {
    document.addEventListener("play", function(e) {
        if (e.target.tagName !== "AUDIO") return;
        const audio = e.target;
        const limit = Number(audio.dataset.limit || 0);
        if (limit <= 0 || audio.dataset.counted === "true") return;

        const pageId = audio.dataset.pageId;
        const audioId = audio.dataset.audioId;
        const storageKey = `listen_${activeExamData._id}_${pageId}_${audioId}`;
        let played = parseInt(localStorage.getItem(storageKey)) || 0;
        played += 1;
        localStorage.setItem(storageKey, played);
        audio.dataset.counted = "true";

        const status = document.getElementById(`audio_status_${audioId}`);
        if (status) status.innerText = `Đã nghe: ${played}/${limit}`;
    }, true);

    document.addEventListener("ended", function(e) {
        if (e.target.tagName !== "AUDIO") return;
        const audio = e.target;
        const limit = Number(audio.dataset.limit || 0);
        if (limit <= 0) return;
        const storageKey = `listen_${activeExamData._id}_${audio.dataset.pageId}_${audio.dataset.audioId}`;
        const played = parseInt(localStorage.getItem(storageKey)) || 0;
        if (played >= limit) {
            audio.removeAttribute("controls");
            const status = document.getElementById(`audio_status_${audio.dataset.audioId}`);
            if (status) status.innerText = "❌ Hết lượt nghe";
            alert("Bạn đã dùng hết lượt nghe audio này.");
        }
    }, true);
}

function startTimer(minutes) {
    let remaining = Number(minutes || 0) * 60;
    const timer = document.getElementById("countdownTimer");
    clearInterval(timerInterval);
    timer.classList.remove("danger");

    function render() {
        const m = Math.floor(remaining / 60);
        const s = remaining % 60;
        timer.innerText = `${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
    }

    render();
    timerInterval = setInterval(() => {
        remaining -= 1;
        render();
        if (remaining <= 300) timer.classList.add("danger");
        if (remaining <= 0) {
            clearInterval(timerInterval);
            submitExam(true);
        }
    }, 1000);
}

async function submitExam(auto = false) {
    if (!activeExamData || isSubmitting) return;
    if (!auto && !confirm("Nộp bài? Sau khi nộp sẽ không thể làm lại.")) return;
    saveCurrentPageAnswers();
    isSubmitting = true;
    clearInterval(timerInterval);
    document.querySelectorAll("audio").forEach(a => a.pause());

    const timeSpentSeconds = examStartTime ? Math.floor((Date.now() - examStartTime) / 1000) : 0;

    try {
        const response = await fetch(`${API_URL}/exams/${activeExamData._id}/submit`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                user_id: localStorage.getItem("user_id"),
                student_email: localStorage.getItem("email"),
                answers: answers,
                time_spent_seconds: timeSpentSeconds
            })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || "Không thể nộp bài");
        showResult(data);
    } catch (err) {
        alert(err.message);
    } finally {
        isSubmitting = false;
    }
}

function showResult(data) {
    const tbody = document.getElementById("mistakeBody");
    tbody.innerHTML = "";
    (data.details || []).forEach(row => {
        tbody.insertAdjacentHTML("beforeend", `
            <tr>
                <td>${escapeHtml(row.page_number)}</td>
                <td>${escapeHtml(row.question_number)}</td>
                <td>${escapeHtml(row.student_answer || '(Trống)')}</td>
                <td class="correct-text">${escapeHtml(row.correct_answer)}</td>
                <td>${escapeHtml(row.earned_score)} / ${escapeHtml(row.max_score)}</td>
                <td>${row.is_correct ? '<span class="correct-text">✔ Đúng</span>' : '<span class="wrong-status">✘ Sai</span>'}</td>
            </tr>
        `);
    });
    document.getElementById("testRoom").style.display = "none";
    document.getElementById("resultScreen").style.display = "block";
    document.getElementById("finalScoreDisplay").innerText = Number(data.score || 0).toFixed(2);
    document.getElementById("correctCountDisplay").innerText = `${data.correct_count} / ${data.total_questions}`;
    document.getElementById("timeSpentDisplay").innerText = formatTime(data.time_spent_seconds || 0);
}

function backToDashboard() {
    clearInterval(timerInterval);
    document.getElementById("resultScreen").style.display = "none";
    document.getElementById("testRoom").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    activeExamData = null;
    studentPages = [];
    answers = {};
    loadExamsForStudent();
}
</script>
</body>
</html>
