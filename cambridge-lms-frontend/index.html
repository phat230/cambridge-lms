<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambridge LMS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-card">
        <h1>Cambridge LMS</h1>
        <p class="hint-text center-text">Đăng nhập để vào hệ thống</p>

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('login', this)">Đăng Nhập</button>
            <button class="tab-btn" onclick="switchTab('register', this)">Đăng Ký</button>
        </div>

        <form id="loginForm" class="form-content active">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit" class="submit-btn full-width">Đăng nhập</button>
        </form>

        <form id="registerForm" class="form-content">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="regPassword" required minlength="6">
            </div>
            <div class="form-group">
                <label>Nhập lại mật khẩu</label>
                <input type="password" id="regConfirmPassword" required minlength="6">
            </div>
            <button type="submit" class="submit-btn full-width">Đăng ký học sinh</button>
        </form>

        <div id="message" class="message center-text"></div>
    </div>

<script>
    const API_URL = "https://cambridge-lms-1.onrender.com";

    function switchTab(tabName, clickedButton = null) {
        document.querySelectorAll('.form-content').forEach(form => form.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabName + 'Form').classList.add('active');

        if (clickedButton) {
            clickedButton.classList.add('active');
        } else {
            document.querySelectorAll('.tab-btn')[tabName === 'login' ? 0 : 1].classList.add('active');
        }
        document.getElementById('message').innerText = "";
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const msg = document.getElementById('message');
        msg.style.color = 'blue';
        msg.innerText = 'Đang đăng nhập...';

        try {
            const res = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    email: document.getElementById('loginEmail').value.trim(),
                    password: document.getElementById('loginPassword').value
                })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Đăng nhập thất bại');

            localStorage.setItem('user_id', data.user_id);
            localStorage.setItem('email', data.email);
            localStorage.setItem('role', data.role);
            window.location.href = data.role === 'teacher' ? 'teacher.html' : 'student.html';
        } catch (err) {
            msg.style.color = 'red';
            msg.innerText = err.message;
        }
    });

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const msg = document.getElementById('message');
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirmPassword').value;
        if (password !== confirm) {
            msg.style.color = 'red';
            msg.innerText = 'Mật khẩu nhập lại không khớp';
            return;
        }

        msg.style.color = 'blue';
        msg.innerText = 'Đang đăng ký...';
        try {
            const res = await fetch(`${API_URL}/auth/register`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    email: document.getElementById('regEmail').value.trim(),
                    password: password,
                    confirm_password: confirm
                })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Đăng ký thất bại');
            msg.style.color = 'green';
            msg.innerText = 'Đăng ký thành công. Hãy đăng nhập.';
            switchTab('login');
            document.getElementById('loginEmail').value = document.getElementById('regEmail').value.trim();
        } catch (err) {
            msg.style.color = 'red';
            msg.innerText = err.message;
        }
    });
</script>
</body>
</html>
