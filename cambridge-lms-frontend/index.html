<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambridge LMS - Nền tảng thi trực tuyến</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

<div class="auth-container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login', this)">Đăng Nhập</button>
        <button class="tab-btn" onclick="switchTab('register', this)">Đăng Ký</button>
    </div>

    <form id="loginForm" class="form-content active">
        <div class="form-group">
            <label for="loginEmail">Email:</label>
            <input type="email" id="loginEmail" required placeholder="Nhập email của bạn">
        </div>

        <div class="form-group">
            <label for="loginPassword">Mật khẩu:</label>
            <input type="password" id="loginPassword" required placeholder="Nhập mật khẩu">
        </div>

        <button type="submit" class="submit-btn full-width">Đăng Nhập</button>

        <div class="forgot-password">
            <a href="#" onclick="forgotPassword()">Quên mật khẩu?</a>
        </div>
    </form>

    <form id="registerForm" class="form-content">
        <div class="form-group">
            <label for="regEmail">Email học sinh:</label>
            <input type="email" id="regEmail" required placeholder="Nhập email">
        </div>

        <div class="form-group">
            <label for="regPassword">Mật khẩu (ít nhất 6 ký tự):</label>
            <input type="password" id="regPassword" required placeholder="Nhập mật khẩu" minlength="6">
        </div>

        <div class="form-group">
            <label for="regConfirmPassword">Nhập lại mật khẩu:</label>
            <input type="password" id="regConfirmPassword" required placeholder="Xác nhận mật khẩu">
        </div>

        <button type="submit" class="submit-btn full-width">Đăng Ký Tài Khoản</button>
    </form>

    <div id="message"></div>
</div>

<script>
    const API_URL = "https://cambridge-lms-1.onrender.com";

    function switchTab(tabName, clickedButton = null) {
        document.querySelectorAll('.form-content').forEach(form => form.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

        document.getElementById(tabName + 'Form').classList.add('active');

        if (clickedButton) {
            clickedButton.classList.add('active');
        } else {
            const tabButtons = document.querySelectorAll('.tab-btn');
            if (tabName === 'login') {
                tabButtons[0].classList.add('active');
            } else {
                tabButtons[1].classList.add('active');
            }
        }

        document.getElementById('message').innerText = "";
    }

    function forgotPassword() {
        alert("Tính năng Quên mật khẩu đang được cập nhật ở Backend. Vui lòng liên hệ Admin!");
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const msgDiv = document.getElementById('message');

        msgDiv.style.color = "blue";
        msgDiv.innerText = "Đang xử lý đăng nhập...";

        try {
            const response = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            });

            const data = await response.json();

            if (response.ok) {
                msgDiv.style.color = "green";
                msgDiv.innerText = "Đăng nhập thành công!";

                localStorage.setItem('user_id', data.user_id);
                localStorage.setItem('role', data.role);
                localStorage.setItem('email', data.email);

                setTimeout(() => {
                    if (data.role === 'teacher') {
                        window.location.href = 'teacher.html';
                    } else {
                        window.location.href = 'student.html';
                    }
                }, 800);
            } else {
                msgDiv.style.color = "red";
                msgDiv.innerText = data.detail || "Đăng nhập thất bại!";
            }
        } catch (error) {
            console.error(error);
            msgDiv.style.color = "red";
            msgDiv.innerText = "Không thể kết nối đến Backend!";
        }
    });

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm_password = document.getElementById('regConfirmPassword').value;
        const msgDiv = document.getElementById('message');

        if (password !== confirm_password) {
            msgDiv.style.color = "red";
            msgDiv.innerText = "Mật khẩu nhập lại không khớp!";
            return;
        }

        msgDiv.style.color = "blue";
        msgDiv.innerText = "Đang xử lý đăng ký...";

        try {
            const response = await fetch(`${API_URL}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: email,
                    password: password,
                    confirm_password: confirm_password
                })
            });

            const data = await response.json();

            if (response.ok) {
                msgDiv.style.color = "green";
                msgDiv.innerText = "Đăng ký thành công! Đang chuyển sang Đăng nhập...";

                setTimeout(() => {
                    switchTab('login');
                    document.getElementById('loginEmail').value = email;
                    document.getElementById('loginPassword').value = "";
                }, 1200);
            } else {
                msgDiv.style.color = "red";
                msgDiv.innerText = data.detail || "Lỗi đăng ký!";
            }
        } catch (error) {
            console.error(error);
            msgDiv.style.color = "red";
            msgDiv.innerText = "Không thể kết nối đến Backend!";
        }
    });
</script>

</body>
</html>
